<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The 50 Capitals Loop</title>
<meta name="description" content="A road-trip route through every U.S. state capital, with arrows on the real map." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1117; --surface:#151c26; --surface2:#1b2431; --line:#27303d;
    --ink:#e9edf2; --muted:#8b97a6; --faint:#5b6573;
    --land:#1a222e; --landstroke:#2c3847;
    --green:#1f7d4d; --greenline:#46e08a; --greendot:#7bf2ab;
    --done:#6b7686; --shield:#f2f4f7; --sig:#f4b740; --gem:#ffce4d;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{display:flex;flex-direction:column;height:100vh}
  header{padding:14px 18px 12px;border-bottom:1px solid var(--line);
    display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 18px;
    background:linear-gradient(180deg,#111822,#0d1117)}
  h1{font-family:Oswald,system-ui,sans-serif;font-weight:600;letter-spacing:.06em;
    text-transform:uppercase;font-size:18px;margin:0}
  h1 .num{color:var(--sig)}
  .sub{color:var(--muted);font-size:12.5px;letter-spacing:.02em}
  .totals{margin-left:auto;display:flex;gap:18px;font-size:12px;color:var(--muted)}
  .totals b{display:block;font-family:Oswald;font-weight:600;font-size:17px;color:var(--ink);letter-spacing:.04em}
  .toggles{display:flex;flex-wrap:wrap;gap:8px;width:100%;margin-top:4px;align-items:center}
  .toggles button{font:inherit;font-size:11.5px;letter-spacing:.04em;cursor:pointer;
    background:var(--surface);color:var(--muted);border:1px solid var(--line);
    border-radius:999px;padding:4px 12px;transition:.15s}
  .toggles button.on{background:var(--surface2);color:var(--ink);border-color:#3a4757}
  .toggles button:hover{color:var(--ink)}
  .key{display:flex;gap:14px;margin-left:auto;font-size:11px;color:var(--muted);align-items:center}
  .key i{font-style:normal;display:inline-flex;align-items:center;gap:5px}
  .swatch{width:12px;height:12px;border-radius:3px;display:inline-block}
  .swatch.g{background:var(--green);border:1px solid var(--greenline)}
  .swatch.r{width:18px;height:0;border-top:2.4px solid #34d399;border-radius:2px}
  .swatch.c{width:18px;height:0;border-top:2.4px dashed var(--faint)}

  .main{display:flex;flex:1;min-height:0}
  .mapcol{flex:1.55;min-width:0;position:relative;background:radial-gradient(120% 90% at 50% 0%,#121a25 0%,#0d1117 70%)}
  #map{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
  #map:active{cursor:grabbing}
  .zoomctl{position:absolute;right:10px;bottom:10px;z-index:6;display:flex;flex-direction:column;gap:6px}
  .zoomctl button{width:38px;height:38px;font-size:20px;line-height:1;cursor:pointer;
    background:#0b1018e6;color:var(--ink);border:1px solid #33414f;border-radius:9px;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);
    transition:background .15s,border-color .15s,transform .08s;-webkit-tap-highlight-color:transparent}
  .zoomctl button:hover{background:var(--surface2);border-color:#3a4757}
  .zoomctl button:active{transform:scale(.93)}
  .zoomctl .reset{font-size:16px}
  .zoomhint{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:6;
    pointer-events:none;font-size:12px;letter-spacing:.02em;color:var(--ink);
    background:#0b1018d9;border:1px solid #33414f;border-radius:999px;padding:6px 14px;
    backdrop-filter:blur(3px);transition:opacity .6s ease;white-space:nowrap}
  .zoomhint.hide{opacity:0}
  .state{fill:var(--land);stroke:var(--landstroke);stroke-width:.6;transition:fill .15s;vector-effect:non-scaling-stroke}
  .state.visited{fill:var(--green);stroke:var(--greenline);stroke-width:1}
  .state:hover{fill:#222d3b}
  .state.visited:hover{fill:#26895a}
  .seg{fill:none;stroke-width:2.1;stroke-linecap:round;opacity:.95;cursor:pointer;transition:stroke-width .12s,opacity .12s;vector-effect:non-scaling-stroke}
  .seg.connector{stroke-dasharray:3 5;opacity:.55}
  .seg.dim{opacity:.14}
  .seg.hot{stroke-width:4.6;opacity:1}
  .stop circle{stroke:#0d1117;stroke-width:1.4}
  .stop text{font-family:Oswald;font-weight:500;font-size:9.5px;fill:#cfd6df;letter-spacing:.02em;pointer-events:none;
    paint-order:stroke;stroke:#0d1117cc;stroke-width:2.4px}
  .stop.hot text{fill:#fff;font-weight:600}
  .stop.home circle{fill:var(--shield)}
  .stop.home text{fill:#fff;font-weight:600}
  .done circle{fill:var(--greendot);stroke:#0d1117;stroke-width:1.2}
  .done text{font-family:Oswald;font-size:9px;fill:var(--greendot);letter-spacing:.02em;
    paint-order:stroke;stroke:#0d1117cc;stroke-width:2.4px}
  .gem path{fill:var(--gem);stroke:#0d1117;stroke-width:1.1;cursor:pointer;transition:fill .12s}
  .gem:hover path{fill:#ffe7a3}
  .key .gemstar{color:var(--gem);font-size:13px;line-height:1}

  .tip{position:absolute;pointer-events:none;z-index:5;max-width:236px;
    background:#0b1018f2;border:1px solid #33414f;border-radius:9px;padding:9px 11px;
    font-size:12.5px;line-height:1.35;opacity:0;transform:translateY(4px);
    transition:opacity .12s,transform .12s;backdrop-filter:blur(3px)}
  .tip.show{opacity:1;transform:none}
  .tip .route{font-family:Oswald;font-weight:600;letter-spacing:.02em;font-size:13px}
  .tip .meta{color:var(--sig);font-family:Oswald;letter-spacing:.03em;margin:2px 0 4px}
  .tip .note{color:var(--muted)}

  .panel{flex:1;min-width:300px;max-width:430px;overflow-y:auto;border-left:1px solid var(--line);background:var(--bg)}
  .leg h2{font-family:Oswald;font-weight:600;text-transform:uppercase;letter-spacing:.07em;font-size:12.5px;margin:0;
    padding:11px 16px 9px;display:flex;align-items:center;gap:10px;position:sticky;top:0;background:#0f151ef2;backdrop-filter:blur(4px);z-index:2}
  .leg h2 .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .leg h2 .lg{color:var(--faint);font-weight:400;margin-left:auto;font-size:11px;letter-spacing:.03em}
  .leg h2{cursor:pointer}
  .leg h2:hover{background:#16202c}
  .row{display:grid;grid-template-columns:26px 1fr;gap:10px;padding:9px 16px 11px;cursor:pointer;border-top:1px solid #1a212c;transition:background .12s}
  .row:hover,.row.hot{background:var(--surface)}
  .idx{font-family:Oswald;font-weight:600;color:var(--faint);font-size:13px;text-align:right;padding-top:1px}
  .row.hot .idx{color:var(--sig)}
  .city{font-family:Oswald;font-weight:600;letter-spacing:.02em;font-size:14.5px}
  .city span{color:var(--muted);font-weight:400;font-size:12px}
  .drive{display:flex;align-items:center;gap:8px;margin:3px 0 4px;font-size:11.5px;color:var(--sig);font-family:Oswald;letter-spacing:.03em}
  .drive .arr{color:var(--faint)}
  .note{font-size:12.5px;color:var(--muted);line-height:1.4}
  .flights{padding:14px 16px 26px;border-top:1px solid var(--line)}
  .flights h2{font-family:Oswald;text-transform:uppercase;letter-spacing:.07em;font-size:12.5px;margin:0 0 8px}
  .flight{display:flex;gap:10px;font-size:12.5px;color:var(--muted);padding:6px 0;border-top:1px solid #1a212c}
  .flight b{font-family:Oswald;color:var(--ink);font-weight:600;letter-spacing:.02em}
  .plane{color:var(--sig)}

  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
    gap:10px;color:var(--muted);font-size:13px;background:var(--bg);z-index:9;text-align:center;padding:24px}
  .spin{width:26px;height:26px;border:3px solid #2a3543;border-top-color:var(--sig);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .overlay a{color:var(--sig)}
  @media(max-width:860px){
    .main{flex-direction:column}
    .mapcol{flex:none;height:50vh}
    .panel{max-width:none;border-left:none;border-top:1px solid var(--line)}
    .totals{order:3;width:100%;margin:6px 0 0}
    .key{display:none}
  }
  @media(max-width:560px){
    header{padding:10px 12px 10px}
    h1{font-size:16px}
    .sub{font-size:11.5px}
    .mapcol{height:40vh}
    .totals{gap:14px;font-size:11px}
    .toggles button{font-size:11px;padding:4px 10px}
    .zoomctl button{width:42px;height:42px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>The <span class="num">50</span> Capitals Loop</h1>
    <span class="sub">NYC &rarr; 44 lower-48 capitals &rarr; NYC &middot; 4 states already done</span>
    <div class="totals">

    <div class="toggles">

      <button id="bGems" class="on">Sights &amp; gems</button>
      <button id="bReset">Reset highlight</button>
      <div class="key">
        <i><span class="swatch g"></span>Visited</i>
        <i><span class="swatch r"></span>Drive (direction)</i>
        <i><span class="swatch c"></span>Connector</i>
        <i><span class="gemstar">&#9733;</span>Worth a stop</i>
      </div>
    </div>
  </header>
  <div class="main">
    <div class="mapcol">
      <svg id="map"></svg>
      <div class="zoomctl" id="zoomctl">
        <button data-z="in" title="Zoom in" aria-label="Zoom in">+</button>
        <button data-z="out" title="Zoom out" aria-label="Zoom out">&minus;</button>
        <button data-z="reset" class="reset" title="Reset view" aria-label="Reset view">&#x2922;</button>
      </div>
      <div class="zoomhint" id="zoomhint">Scroll / pinch to zoom &middot; drag to pan</div>
      <div class="tip" id="tip"></div>
      <div class="overlay" id="overlay"><div class="spin"></div><div>Loading the map&hellip;</div></div>
    </div>
    <div class="panel" id="panel"></div>
  </div>
</div>

  {n:"Red Rocks Amphitheatre",lat:39.6655,lon:-105.2050,cat:"Scenic view · CO",note:"Concerts among giant sandstone fins outside Denver."},
  // Central Plains
  {n:"Brown v. Board NHS",lat:39.0386,lon:-95.6760,cat:"History · Topeka KS",note:"The school at the heart of the landmark ruling."},
  {n:"Bridges of Madison County",lat:41.3350,lon:-94.0130,cat:"Hidden gem · IA",note:"Covered bridges southwest of Des Moines."},
  // Upper Midwest
  {n:"Minnehaha Falls",lat:44.9153,lon:-93.2110,cat:"Scenic view · MN",note:"53-ft waterfall in the Twin Cities."},
  {n:"House on the Rock",lat:43.0905,lon:-90.1320,cat:"Hidden gem · WI",note:"Gloriously bizarre roadside attraction near Madison."},
  {n:"Wisconsin Dells",lat:43.6275,lon:-89.7710,cat:"Roadside · WI",note:"Sandstone gorges and kitschy water-park town."},
  {n:"Lincoln's Tomb, Springfield",lat:39.8240,lon:-89.6560,cat:"History · IL",note:"Honest Abe's resting place."},
  {n:"Gateway Arch, St. Louis",lat:38.6247,lon:-90.1848,cat:"Landmark · MO",note:"630-ft stainless arch on the Mississippi."},
  // Great Lakes & Ohio
  {n:"Indianapolis Motor Speedway",lat:39.7950,lon:-86.2350,cat:"Landmark · IN",note:"Home of the Indy 500."},
  {n:"The Henry Ford, Dearborn",lat:42.3030,lon:-83.2340,cat:"Hidden gem · MI",note:"Vast Americana museum near Detroit."},
  {n:"Hocking Hills State Park",lat:39.4200,lon:-82.5400,cat:"Nature · OH",note:"Caves and waterfalls southeast of Columbus."},
  // Appalachia -> home
  {n:"Buffalo Trace Distillery",lat:38.2170,lon:-84.8660,cat:"Hidden gem · Frankfort KY",note:"Oldest continuously operating bourbon distillery."},
  {n:"New River Gorge NP",lat:38.0700,lon:-81.0800,cat:"Nature · WV",note:"America's newest national park and its iconic bridge."},
  {n:"Fallingwater",lat:39.9060,lon:-79.4680,cat:"Landmark · PA",note:"Frank Lloyd Wright's house over a waterfall, on the way home."}
];

const R=3958.8,rad=Math.PI/180,CIRC=1.18,MPH=60;
function haversine(a,b){const dLat=(b.lat-a.lat)*rad,dLon=(b.lon-a.lon)*rad;
  const s=Math.sin(dLat/2)**2+Math.cos(a.lat*rad)*Math.cos(b.lat*rad)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));}
function hm(h){let H=Math.floor(h),m=Math.round((h-H)*60);if(m===60){H++;m=0;}return H+"h"+(m?(" "+m+"m"):"");}
const color=d3.interpolateRgbBasis(["#38bdf8","#34d399","#a3e635","#facc15","#fb923c","#f43f5e"]);

const segs=[];
for(let i=0;i<route.length-1;i++){
  const mi=haversine(route[i],route[i+1])*CIRC;
  segs.push({i,a:route[i],b:route[i+1],miles:mi,hours:mi/MPH,note:notes[i],
    connector:route[i].home||route[i+1].home,t:i/(route.length-2)});
}
const totMiles=segs.reduce((s,d)=>s+d.miles,0),totHours=segs.reduce((s,d)=>s+d.hours,0);
document.getElementById('tMiles').textContent=Math.round(totMiles/50)*50+" mi";
document.getElementById('tHours').textContent=Math.round(totHours)+" h";

const svg=d3.select("#map"),mapcol=document.querySelector(".mapcol"),tip=document.getElementById("tip");
const defs=svg.append("defs");
const gZoom=svg.append("g");
const gLand=gZoom.append("g"),gSeg=gZoom.append("g"),gDone=gZoom.append("g"),gGem=gZoom.append("g"),gStop=gZoom.append("g");
const STAR=d3.symbol().type(d3.symbolStar).size(46)();
const zoom=d3.zoom().scaleExtent([1,9]).on("zoom",zoomed);
svg.call(zoom);
svg.on("click.tip",hideTip);  // tap empty map to dismiss a sight tooltip
function zoomed(ev){
  const t=ev.transform;gZoom.attr("transform",t);
  const inv=1/t.k;  // keep point markers + labels at constant screen size
  gStop.selectAll("g").attr("transform",function(){return `translate(${this.dataset.x},${this.dataset.y}) scale(${inv})`;});
  gDone.selectAll("g").attr("transform",function(){return `translate(${this.dataset.x},${this.dataset.y}) scale(${inv})`;});
  gGem.selectAll("g").attr("transform",function(){return `translate(${this.dataset.x},${this.dataset.y}) scale(${inv})`;});
}
segs.forEach(s=>{
  defs.append("marker").attr("id","ah"+s.i).attr("viewBox","0 0 10 10")
    .attr("refX",8.5).attr("refY",5).attr("markerWidth",6).attr("markerHeight",6)
    .attr("orient","auto-start-reverse")
    .append("path").attr("d","M0,0 L10,5 L0,10 L3.2,5 Z")
    .attr("fill",s.connector?"#5b6573":color(s.t));
});

let proj,path,statesFC=null,routePts=[];
function draw(){
  const W=mapcol.clientWidth,H=mapcol.clientHeight;
  svg.attr("width",W).attr("height",H);
  zoom.translateExtent([[0,0],[W,H]]).extent([[0,0],[W,H]]);
  svg.call(zoom.transform,d3.zoomIdentity);
  if(!statesFC) return;
  const rightPad=W<700?24:150;
  proj=d3.geoAlbersUsa().fitExtent([[16,18],[W-rightPad,H-18]],statesFC);
  path=d3.geoPath(proj);

  gLand.selectAll("path").data(statesFC.features).join("path")
    .attr("class",d=>"state"+(VISITED.has(d.properties.name)?" visited":""))
    .attr("d",path)
    .each(function(d){ this.querySelector("title")||d3.select(this).append("title")
      .text(d.properties.name+(VISITED.has(d.properties.name)?" \u2713 visited":"")); });

  const P=route.map(d=>proj([d.lon,d.lat]));
  routePts=P;
  gSeg.selectAll("path").remove();
  segs.forEach(s=>{
    const p0=P[s.i],p1=P[s.i+1];if(!p0||!p1)return;
    const mx=(p0[0]+p1[0])/2,my=(p0[1]+p1[1])/2,dx=p1[0]-p0[0],dy=p1[1]-p0[1],off=0.085;
    const cx=mx-dy*off,cy=my+dx*off;
    gSeg.append("path").attr("class","seg"+(s.connector?" connector":""))
      .attr("d",`M${p0[0]},${p0[1]} Q${cx},${cy} ${p1[0]},${p1[1]}`)
      .attr("stroke",s.connector?"#5b6573":color(s.t))
      .attr("marker-end",`url(#ah${s.i})`).attr("data-seg",s.i)
      .on("mousemove",e=>showTip(e,s))
      .on("mouseenter",()=>hot(s.i+1)).on("mouseleave",()=>{hideTip();clearHot();});
  });
  gDone.selectAll("g").remove();
  doneCaps.forEach(d=>{const p=proj([d.lon,d.lat]);if(!p)return;
    const g=gDone.append("g").attr("class","done").attr("data-x",p[0]).attr("data-y",p[1]).attr("transform",`translate(${p[0]},${p[1]})`);
    g.append("circle").attr("r",4);
    g.append("text").attr("x",7).attr("y",3).text(d.n+" \u2713");});
  gStop.selectAll("g").remove();
  route.forEach((d,i)=>{const p=P[i];if(!p)return;
    const g=gStop.append("g").attr("class","stop"+(d.home?" home":"")).attr("data-x",p[0]).attr("data-y",p[1]).attr("transform",`translate(${p[0]},${p[1]})`).attr("data-stop",i);
    g.append("circle").attr("r",d.home?5:3.6).attr("fill",d.home?null:color(i/(route.length-2)));
    if(!d.home)g.append("text").attr("x",6).attr("y",3).text(d.n);
    else g.append("text").attr("x",6).attr("y",-6).text("NYC");
    g.on("mouseenter",()=>{if(i>0)hot(i);}).on("mouseleave",clearHot);});
  gGem.selectAll("g").remove();
  gems.forEach(d=>{const p=proj([d.lon,d.lat]);if(!p)return;
    const g=gGem.append("g").attr("class","gem").attr("data-x",p[0]).attr("data-y",p[1]).attr("transform",`translate(${p[0]},${p[1]})`);
    g.append("path").attr("d",STAR);
    g.on("mouseenter",e=>showGemTip(e,d)).on("mousemove",e=>showGemTip(e,d)).on("mouseleave",hideTip)
     .on("click",e=>{e.stopPropagation();showGemTip(e,d);});});
  applyToggles();
}
function showGemTip(e,d){const r=mapcol.getBoundingClientRect();
  tip.innerHTML=`<div class="route">★ ${d.n}</div>`+
    `<div class="meta">${d.cat}</div>`+
    `<div class="note">${d.note}</div>`;
  let x=e.clientX-r.left+14,y=e.clientY-r.top+14;
  if(x>r.width-248)x=e.clientX-r.left-248;if(y>r.height-92)y=e.clientY-r.top-92;
  tip.style.left=x+"px";tip.style.top=y+"px";tip.classList.add("show");}
function showTip(e,s){const r=mapcol.getBoundingClientRect();
  tip.innerHTML=`<div class="route">${s.a.home?"NYC":s.a.n} \u2192 ${s.b.home?"NYC":s.b.n}</div>`+
    `<div class="meta">\u2248 ${Math.round(s.miles/5)*5} mi \u00b7 ${hm(s.hours)} driving</div>`+
    `<div class="note">${s.note}</div>`;
  let x=e.clientX-r.left+14,y=e.clientY-r.top+14;
  if(x>r.width-248)x=e.clientX-r.left-248;if(y>r.height-92)y=e.clientY-r.top-92;
  tip.style.left=x+"px";tip.style.top=y+"px";tip.classList.add("show");}
function hideTip(){tip.classList.remove("show");}
function hot(stopIdx){clearHot();const segIdx=stopIdx-1;
  gSeg.selectAll("path").classed("dim",true);
  gSeg.select(`[data-seg="${segIdx}"]`).classed("dim",false).classed("hot",true).raise();
  gStop.select(`[data-stop="${stopIdx}"]`).classed("hot",true).raise();
  const row=document.querySelector(`.row[data-stop="${stopIdx}"]`);
  if(row){row.classList.add("hot");row.scrollIntoView({block:"nearest",behavior:"smooth"});}}
function clearHot(){gSeg.selectAll("path").classed("dim",false).classed("hot",false);
  gStop.selectAll("g").classed("hot",false);
  document.querySelectorAll(".row.hot").forEach(r=>r.classList.remove("hot"));}
function zoomToPoints(pts,fill=0.8,maxK=9){
  pts=(pts||[]).filter(Boolean);if(!pts.length)return;
  if(!showLabels){showLabels=true;bL.classList.add("on");applyToggles();}
  const W=mapcol.clientWidth,H=mapcol.clientHeight;
  const xs=pts.map(p=>p[0]),ys=pts.map(p=>p[1]);
  const x0=Math.min(...xs),x1=Math.max(...xs),y0=Math.min(...ys),y1=Math.max(...ys);
  const w=Math.max(x1-x0,1),h=Math.max(y1-y0,1),cx=(x0+x1)/2,cy=(y0+y1)/2;
  let k=Math.min(W/w,H/h)*fill;k=Math.max(1,Math.min(maxK,k));
  dropHint();
  svg.transition().duration(450).call(zoom.transform,
    d3.zoomIdentity.translate(W/2-k*cx,H/2-k*cy).scale(k));}

// panel
const panel=document.getElementById("panel");
legs.forEach(leg=>{
  const mid=Math.round((leg.a+leg.b)/2),c=color(mid/(route.length-2));
  const legMi=d3.sum(d3.range(leg.a,leg.b+1),i=>segs[i-1].miles);
  const div=document.createElement("div");div.className="leg";
  div.innerHTML=`<h2 title="Zoom to this region"><span class="dot" style="background:${c}"></span>${leg.t}<span class="lg">\u2248 ${Math.round(legMi/10)*10} mi</span></h2>`;
  div.querySelector("h2").addEventListener("click",()=>zoomToPoints(routePts.slice(leg.a-1,leg.b+1),.8));
  for(let i=leg.a;i<=leg.b;i++){const d=route[i],s=segs[i-1];
    const row=document.createElement("div");row.className="row";row.dataset.stop=i;
    row.title="Zoom to this stop";
    row.innerHTML=`<div class="idx">${i}</div><div>`+
      `<div class="city">${d.n} <span>${d.st}</span></div>`+
      `<div class="drive"><span class="arr">\u2197</span>\u2248 ${Math.round(s.miles/5)*5} mi \u00b7 ${hm(s.hours)}</div>`+
      `<div class="note">${s.note}</div></div>`;
    row.addEventListener("mouseenter",()=>hot(i));
    row.addEventListener("mouseleave",clearHot);
    row.addEventListener("click",()=>{const lo=Math.max(0,i-2),hi=Math.min(route.length-1,i+1);
      hot(i);zoomToPoints(routePts.slice(lo,hi+1),.7,6);});
    div.appendChild(row);}
  panel.appendChild(div);
});
const fl=document.createElement("div");fl.className="flights";
fl.innerHTML=`<h2>+ Two flights</h2>`+
 `<div class="flight"><span class="plane">\u2708</span><div><b>Juneau, AK</b> &mdash; no road reaches it from the lower 48; fly in (or take the ferry).</div></div>`+
 `<div class="flight"><span class="plane">\u2708</span><div><b>Honolulu, HI</b> &mdash; fly from the West Coast, ideally bolted onto the Pacific Northwest leg.</div></div>`+
 `<div class="flight" style="border-top:none;color:var(--faint)"><span style="color:var(--greendot)">\u2713</span><div>Already done (green): Boston MA, Albany NY, Montpelier VT, Nashville TN.</div></div>`;
panel.appendChild(fl);

// zoom controls
const zc=document.getElementById("zoomctl");
zc.querySelector('[data-z="in"]').onclick=()=>svg.transition().duration(200).call(zoom.scaleBy,1.6);
zc.querySelector('[data-z="out"]').onclick=()=>svg.transition().duration(200).call(zoom.scaleBy,1/1.6);
zc.querySelector('[data-z="reset"]').onclick=()=>svg.transition().duration(250).call(zoom.transform,d3.zoomIdentity);

// zoom hint — fades on first map interaction or after a few seconds
const hint=document.getElementById("zoomhint");
let hintGone=false;
function dropHint(){if(hintGone||!hint)return;hintGone=true;hint.classList.add("hide");setTimeout(()=>hint.remove(),700);}
zoom.on("start.hint",dropHint);

// toggles
let showLabels=window.matchMedia("(min-width:700px)").matches,showDone=true,showGems=true;
const bL=document.getElementById("bLabels"),bD=document.getElementById("bDone"),bG=document.getElementById("bGems"),bR=document.getElementById("bReset");
bL.classList.toggle("on",showLabels);
function applyToggles(){gStop.selectAll("text").style("display",showLabels?null:"none");
  gDone.style("display",showDone?null:"none");
  gGem.style("display",showGems?null:"none");}
bL.onclick=()=>{showLabels=!showLabels;bL.classList.toggle("on",showLabels);applyToggles();};
bD.onclick=()=>{showDone=!showDone;bD.classList.toggle("on",showDone);applyToggles();};
bG.onclick=()=>{showGems=!showGems;bG.classList.toggle("on",showGems);applyToggles();};
bR.onclick=clearHot;

// load real US map, then draw
const overlay=document.getElementById("overlay");
function fail(){
  overlay.innerHTML='<div>Couldn\u2019t load the U.S. map data.</div>'+
    '<div style="font-size:12px">Check your connection and refresh \u2014 the map loads from a public CDN '+
    '(<a href="'+US_ATLAS+'">us-atlas</a>).</div>';
}
if(typeof d3==="undefined"||typeof topojson==="undefined"){fail();}
else{
  d3.json(US_ATLAS).then(us=>{
    statesFC=topojson.feature(us,us.objects.states);
    overlay.style.display="none";
    draw();
    setTimeout(dropHint,5000);
  }).catch(fail);
}
let rt;window.addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(draw,150);});
</script>
</body>
